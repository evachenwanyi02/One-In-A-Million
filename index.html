<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One In A Million — O, I AM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;400;500;600&family=Playfair+Display:wght@400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --teal: #5699a3;
    --teal-light: #e8f4f6;
    --teal-dark: #4a8a94;
    --amber: #d4c8c0;
    --amber-light: #f5f0ed;
    --text: #2c2c2c;
    --text-secondary: #6b6b6b;
    --text-muted: #999;
    --bg: #fafaf8;
    --card-bg: #ffffff;
    --border: #e8e5e0;
    --radius: 10px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'DM Sans', 'Noto Serif SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Hero with floating logos ── */
  .hero {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
    padding: 50px 40px 24px;
    text-align: center;
    overflow: hidden;
  }

  /* Floating logos container — sits behind title */
  .logo-field {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .floating-logo {
    position: absolute;
    width: 52px;
    height: 52px;
    object-fit: contain;
    pointer-events: none;
    will-change: transform, opacity;
    filter: grayscale(20%);
  }

  .hero-title {
    position: relative;
    z-index: 1;
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--teal);
    cursor: pointer;
    transition: color 0.2s;
    user-select: none;
    margin-bottom: 28px;
  }

  .hero-title:hover { color: var(--teal-dark); }

  .hero-title .hint {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--amber);
    margin-top: 6px;
    transition: opacity 0.3s;
  }

  .hero-title.expanded .hint { opacity: 0; }

  /* ── Story Dropdown ── */
  .story-dropdown {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: -12px auto 0;
    padding: 0 24px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.5s ease, opacity 0.4s ease, margin 0.4s ease;
  }

  .story-dropdown.open {
    max-height: 400px;
    opacity: 1;
    margin-bottom: 16px;
  }

  .story-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
  }

  .story-subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--teal);
    margin-bottom: 14px;
  }

  .story-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.88rem;
    line-height: 2;
    color: var(--text-secondary);
    text-align: justify;
  }

  .story-text .name { color: var(--teal); font-weight: 600; }
  .story-text .song { font-style: italic; color: var(--text); }

  .divider {
    width: 36px;
    height: 2px;
    background: var(--amber);
    margin: 28px auto;
    border-radius: 1px;
  }

  /* ── Projects Section ── */
  .projects {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 80px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .section-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* ── Projects Grid — 6 columns ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 56px 44px;
  }

  /* ── Book Card ── */
  .book-card {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .book-card:hover { transform: translateY(-6px); }

  .book-cover {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 4px 8px 8px 4px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.25s ease;
    cursor: pointer;
  }

  .book-card:hover .book-cover { box-shadow: var(--shadow-md); }

  .book-cover::before,
  .book-cover::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 4px 8px 8px 4px;
    pointer-events: none;
  }

  .book-cover::before {
    background: #f0ece7;
    transform: translate(3px, 3px);
    z-index: -2;
    box-shadow: 1px 1px 2px rgba(0,0,0,0.05);
  }

  .book-cover::after {
    background: #f5f1ec;
    transform: translate(1.5px, 1.5px);
    z-index: -1;
    box-shadow: 0.5px 0.5px 1px rgba(0,0,0,0.04);
  }

  .book-spine {
    position: absolute;
    left: 0; top: 0;
    width: 5px; height: 100%;
    background: linear-gradient(90deg, rgba(0,0,0,0.08), rgba(0,0,0,0.02));
    z-index: 3;
    pointer-events: none;
  }

  .book-thumbnail {
    width: 100%; height: 100%;
    background: linear-gradient(145deg, #f8f6f3 0%, #eee9e3 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .doc-lines {
    width: 58%;
    display: flex;
    flex-direction: column;
    gap: 3px;
    opacity: 0.22;
  }

  .doc-lines span {
    display: block; height: 2px;
    background: var(--text); border-radius: 1px;
  }

  .doc-lines span:nth-child(odd) { width: 100%; }
  .doc-lines span:nth-child(even) { width: 70%; }
  .doc-lines span:last-child { width: 45%; }

  .size-indicator {
    position: absolute; bottom: 5px; right: 5px;
    display: flex; gap: 1.5px; align-items: flex-end; opacity: 0.3;
  }

  .size-indicator .bar { width: 3px; background: var(--teal); border-radius: 1px; }

  .size-indicator.size-sm .bar:nth-child(1) { height: 4px; opacity: 1; }
  .size-indicator.size-sm .bar:nth-child(2) { height: 7px; opacity: 0.3; }
  .size-indicator.size-sm .bar:nth-child(3) { height: 10px; opacity: 0.15; }
  .size-indicator.size-md .bar:nth-child(1) { height: 4px; opacity: 1; }
  .size-indicator.size-md .bar:nth-child(2) { height: 7px; opacity: 1; }
  .size-indicator.size-md .bar:nth-child(3) { height: 10px; opacity: 0.3; }
  .size-indicator.size-lg .bar:nth-child(1) { height: 4px; opacity: 1; }
  .size-indicator.size-lg .bar:nth-child(2) { height: 7px; opacity: 1; }
  .size-indicator.size-lg .bar:nth-child(3) { height: 10px; opacity: 1; }

  .book-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(0deg, rgba(86,153,163,0.88) 0%, rgba(86,153,163,0.65) 70%, rgba(86,153,163,0) 100%);
    padding: 24px 8px 8px;
    z-index: 2;
  }

  .book-label .label-tag {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.48rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.15);
    padding: 1px 5px; border-radius: 3px; margin-bottom: 3px;
  }

  .book-label .label-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.62rem; font-weight: 600; color: #fff; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ── Meta info ── */
  .book-meta { padding: 6px 2px 0; }

  .book-meta .meta-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem; font-weight: 500; color: var(--text);
    line-height: 1.3; margin-bottom: 3px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .book-meta .meta-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.56rem; color: var(--text-muted); line-height: 1.5;
  }

  .book-meta .meta-row .meta-location { text-align: right; flex-shrink: 0; }

  .book-meta .meta-edited {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.54rem; color: var(--text-muted); opacity: 0.7; line-height: 1.5;
  }

  /* ── Placeholder slots ── */
  .book-card.placeholder { cursor: default; }

  .book-card.placeholder .book-cover {
    border: 1.5px dashed var(--border);
    background: var(--amber-light);
    box-shadow: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .book-card.placeholder:hover .book-cover {
    border-color: var(--teal); background: var(--teal-light);
  }

  .book-card.placeholder .book-cover::before,
  .book-card.placeholder .book-cover::after { display: none; }

  .book-card.placeholder .book-thumbnail { background: transparent; }

  .book-card.placeholder .placeholder-icon {
    font-size: 1.2rem; color: var(--amber); opacity: 0.5;
    transition: color 0.2s, opacity 0.2s;
  }

  .book-card.placeholder:hover .placeholder-icon {
    color: var(--teal); opacity: 0.8;
  }

  /* ── Footer ── */
  footer {
    max-width: 1200px; margin: 0 auto;
    text-align: center; padding: 28px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem; color: var(--text-secondary);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--teal); text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 1024px) {
    .projects-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 768px) {
    .hero, .projects, footer { padding-left: 24px; padding-right: 24px; }
    .projects-grid { grid-template-columns: repeat(3, 1fr); gap: 36px 24px; }
    .floating-logo { width: 36px; height: 36px; }
  }
  @media (max-width: 480px) {
    .hero { padding: 40px 20px 18px; }
    .hero-title { font-size: 1.5rem; }
    .projects { padding: 0 16px 60px; }
    .projects-grid { grid-template-columns: repeat(2, 1fr); gap: 28px 18px; }
    .book-label .label-title { font-size: 0.56rem; }
    .book-meta .meta-name { font-size: 0.62rem; }
    .floating-logo { width: 28px; height: 28px; }
  }
</style>
</head>
<body>

  <section class="hero">
    <!-- Floating logos behind title -->
    <div class="logo-field" id="logoField"></div>

    <h1 class="hero-title" id="titleToggle" onclick="toggleStory()">
      One In A Million
      <span class="hint">tap to discover</span>
    </h1>
  </section>

  <div class="story-dropdown" id="storyDropdown">
    <div class="story-box">
      <p class="story-subtitle">O, I AM……</p>
      <div class="story-text">
        她叫<span class="name">陈婉仪</span>。One 谐音「婉」，一 谐音「仪」——万里挑一，是她藏在自己名字里的小小好意头。这也恰好是一首歌的名字：TWICE 的 <span class="song">ONE IN A MILLION</span>，一种关于「被选中」的概念。那首歌在大学最不确定的日子里反复循环，后来又带着她坐进了来香港后的第一场演唱会。于是，这个名字就留下来了——既是她自己，也是那段被音乐撑住的时光。这个小站，用来存放她在技术路上每一步认真走过的脚印。
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <section class="projects">
    <div class="section-header">
      <p class="section-label">Projects</p>
    </div>

    <div class="projects-grid" id="projectsGrid"></div>
  </section>

  <footer>
    Built with care by 婉仪 · <a href="https://github.com/evachenwanyi02">GitHub</a>
  </footer>


  <script>
    const GRID_COLS = 6;
    const GRID_ROWS = 9;
    const TOTAL_SLOTS = GRID_COLS * GRID_ROWS;

    let projectsData = [];
    let logosData = [];

    // ══════════════════════════════════════
    //  Data Loading
    // ══════════════════════════════════════

    async function loadProjects() {
      try {
        const r = await fetch('projects.json?t=' + Date.now());
        projectsData = await r.json();
      } catch (e) { projectsData = []; }
      renderGrid();
    }

    async function loadLogos() {
      const IMAGE_EXTS = ['png', 'jpg', 'jpeg', 'svg', 'webp', 'gif'];
      try {
        const r = await fetch('https://api.github.com/repos/evachenwanyi02/One-In-A-Million/contents/logos');
        const files = await r.json();
        if (Array.isArray(files)) {
          logosData = files
            .filter(function(f) {
              var ext = f.name.split('.').pop().toLowerCase();
              return f.type === 'file' && IMAGE_EXTS.indexOf(ext) >= 0;
            })
            .map(function(f) {
              var namePart = f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
              return {
                id: f.name.replace(/\.[^.]+$/, '').toLowerCase(),
                name: namePart,
                src: 'logos/' + f.name
              };
            });
        } else {
          logosData = [];
        }
      } catch (e) { logosData = []; }
      renderFloatingLogos();
    }

    // ══════════════════════════════════════
    //  Floating Logos Animation
    // ══════════════════════════════════════

    function renderFloatingLogos() {
      const field = document.getElementById('logoField');
      field.innerHTML = '';
      if (logosData.length === 0) return;

      const heroRect = field.parentElement.getBoundingClientRect();
      const usableW = heroRect.width - 80;
      const usableH = heroRect.height - 40;

      logosData.forEach(function(logo, i) {
        const img = document.createElement('img');
        img.src = logo.src;
        img.alt = logo.name;
        img.className = 'floating-logo';
        img.draggable = false;

        // Distribute logos in a scattered layout
        const cols = Math.min(logosData.length, 6);
        const row = Math.floor(i / cols);
        const col = i % cols;
        const cellW = usableW / cols;
        const cellH = usableH / Math.ceil(logosData.length / cols);

        // Jitter within cell
        const jX = (Math.random() - 0.5) * cellW * 0.5;
        const jY = (Math.random() - 0.5) * cellH * 0.4;
        const baseX = 40 + col * cellW + cellW / 2 - 26 + jX;
        const baseY = 20 + row * cellH + cellH / 2 - 26 + jY;

        img.style.left = baseX + 'px';
        img.style.top = baseY + 'px';

        // Random animation params
        const floatAmp = 6 + Math.random() * 6;        // 6-12px amplitude (subtle)
        const floatPeriod = 3000 + Math.random() * 3000; // 3-6s period
        const opacityMin = 0.20;
        const opacityMax = 0.50;
        const opacityPeriod = 4000 + Math.random() * 4000; // 4-8s
        const phaseOffset = Math.random() * Math.PI * 2;
        const opacityPhase = Math.random() * Math.PI * 2;

        field.appendChild(img);

        // Animate with requestAnimationFrame
        // Using sin() gives natural ease at endpoints (deceleration at peaks)
        function animate(time) {
          // Float: sin gives smooth deceleration at top/bottom (endpoints)
          const floatProgress = Math.sin(time / floatPeriod * Math.PI * 2 + phaseOffset);
          const yOffset = floatProgress * floatAmp;

          // Opacity: oscillate between 20-50%
          const opacityProgress = Math.sin(time / opacityPeriod * Math.PI * 2 + opacityPhase);
          const opacity = opacityMin + (opacityMax - opacityMin) * (opacityProgress * 0.5 + 0.5);

          img.style.transform = 'translateY(' + yOffset + 'px)';
          img.style.opacity = opacity;

          requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
      });
    }

    // Re-layout on resize
    let resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(renderFloatingLogos, 200);
    });

    // ══════════════════════════════════════
    //  Projects Grid
    // ══════════════════════════════════════

    function fmtDate(isoStr) {
      const d = new Date(isoStr);
      const day = d.getDate();
      const month = d.getMonth() + 1;
      const year = String(d.getFullYear()).slice(-2);
      let hours = d.getHours();
      const minutes = String(d.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      return day + '/' + month + '/' + year + ' ' + hours + ':' + minutes + ampm;
    }

    function getSizeClass(size) {
      if (size === 'sm' || size === 'md' || size === 'lg') return size;
      if (typeof size === 'number') {
        if (size < 5000) return 'sm';
        if (size < 20000) return 'md';
        return 'lg';
      }
      return 'md';
    }

    function getDocLineCount(size) {
      var s = getSizeClass(size);
      return s === 'sm' ? 4 : s === 'md' ? 6 : 8;
    }

    function renderGrid() {
      var grid = document.getElementById('projectsGrid');
      var html = '';

      for (var i = 0; i < TOTAL_SLOTS; i++) {
        if (i < projectsData.length) {
          var p = projectsData[i];
          var sc = getSizeClass(p.size);
          var lc = getDocLineCount(p.size);
          var lines = '';
          for (var l = 0; l < lc; l++) lines += '<span></span>';

          var meta = '<div class="meta-name">' + escHtml(p.name) + '</div>'
            + '<div class="meta-row">'
            + '<span>' + fmtDate(p.createdAt) + '</span>'
            + '<span class="meta-location">' + escHtml(p.location) + '</span>'
            + '</div>';
          if (p.editedAt) {
            meta += '<div class="meta-edited">Edited at ' + fmtDate(p.editedAt) + '</div>';
          }

          html += '<a class="book-card" href="' + escHtml(p.href) + '">'
            + '<div class="book-cover"><div class="book-spine"></div>'
            + '<div class="book-thumbnail"><div class="doc-lines">' + lines + '</div>'
            + '<div class="size-indicator size-' + sc + '"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>'
            + '</div>'
            + '<div class="book-label"><span class="label-tag">' + escHtml(p.tag) + '</span>'
            + '<div class="label-title">' + escHtml(p.name) + '</div></div>'
            + '</div><div class="book-meta">' + meta + '</div></a>';
        } else {
          html += '<div class="book-card placeholder">'
            + '<div class="book-cover"><div class="book-thumbnail">'
            + '<span class="placeholder-icon">+</span></div></div></div>';
        }
      }
      grid.innerHTML = html;
    }

    function escHtml(str) {
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ══════════════════════════════════════
    //  Story Toggle
    // ══════════════════════════════════════

    function toggleStory() {
      document.getElementById('storyDropdown').classList.toggle('open');
      document.getElementById('titleToggle').classList.toggle('expanded');
    }

    // ── Init ──
    loadProjects();
    loadLogos();
  </script>

</body>
</html>
